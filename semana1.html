<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
    }
    .login-box {
      max-width: 400px;
      margin: 100px auto;
      padding: 20px;
      background: #1a1a1a;
      border-radius: 10px;
      box-shadow: 0 0 15px rgba(0,255,255,0.2);
    }
    h2 {
      color: #0ff;
      text-align: center;
      margin-bottom: 20px;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">Correo</label>
        <input type="email" id="email" class="form-control" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" id="password" class="form-control" required>
      </div>
      <button type="submit" class="btn btn-outline-light w-100">Ingresar</button>
    </form>
    <p id="error" class="text-danger mt-3"></p>
  </div>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

    // Configuración de Firebase (la tuya)
    const firebaseConfig = {
      apiKey: "AIzaSyBAP3fjuvI7UT9IptOzL_Zw24VvNiLsBYQ",
      authDomain: "trabajo-33782.firebaseapp.com",
      projectId: "trabajo-33782",
      storageBucket: "trabajo-33782.firebasestorage.app",
      messagingSenderId: "191927594007",
      appId: "1:191927594007:web:b11b2e0ebc3d49069e8052",
      measurementId: "G-QRPZWZWYP4"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Login
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;
      const errorMsg = document.getElementById("error");

      try {
        await signInWithEmailAndPassword(auth, email, password);
        // Redirigir si es correcto
        window.location.href = "semana1.html";
      } catch (error) {
        errorMsg.textContent = "❌ Usuario o contraseña incorrectos.";
      }
    });
  </script>
</body>
</html>
