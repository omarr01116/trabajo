<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Mis Trabajos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #121212;
      color: #fff;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Línea superior minimalista */
    .top-line {
      height: 3px;
      background: linear-gradient(90deg, cyan, magenta, blue);
      box-shadow: 0 0 10px cyan, 0 0 20px magenta;
    }

    h2 {
      text-align: center;
      margin: 30px 0;
      font-size: 2rem;
      color: cyan;
      text-shadow: 0 0 10px cyan, 0 0 20px cyan;
    }

    .card {
      background-color: #1f1f1f;
      border: none;
      border-radius: 12px;
      transition: transform 0.3s, box-shadow 0.3s;
      cursor: pointer;
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.1);
    }

    .card:hover {
      transform: scale(1.05);
      box-shadow: 0 0 20px cyan, 0 0 30px magenta;
    }

    .card img {
      border-radius: 10px;
    }

    .card-title {
      font-size: 1rem;
      margin-top: 10px;
      color: #fff;
      text-shadow: 0 0 8px magenta;
    }

    .categoria {
      font-size: 0.85rem;
      color: #aaa;
    }

    /* Botones en modal */
    .modal-content {
      border-radius: 12px;
      border: 2px solid cyan;
      box-shadow: 0 0 20px cyan;
    }

    .btn-success {
      background-color: cyan;
      border: none;
      color: #000;
      font-weight: bold;
      box-shadow: 0 0 10px cyan;
    }

    .btn-success:hover {
      background-color: magenta;
      box-shadow: 0 0 20px magenta;
    }

    .btn-secondary {
      background-color: #333;
      border: none;
      color: #fff;
    }

    .btn-secondary:hover {
      background-color: #444;
    }

    /* Botón volver */
    .btn-outline-light {
      border: 1px solid cyan;
      color: cyan;
      font-weight: bold;
      text-shadow: 0 0 8px cyan;
    }

    .btn-outline-light:hover {
      background-color: cyan;
      color: #000;
      box-shadow: 0 0 15px cyan;
    }
  </style>
</head>
<body>

  <!-- Línea superior -->
  <div class="top-line"></div>

  <!-- Navbar minimal -->
  <nav class="d-flex justify-content-between align-items-center px-3 py-2">
    <a href="index.html" class="btn btn-outline-light">⬅️ Volver</a>
    <span class="fw-bold" style="color: magenta; text-shadow: 0 0 8px magenta;">Mis Trabajos</span>
  </nav>

  <div class="container py-4">
    <h2>Semana 1</h2>

    <div class="row g-4">
      <!-- Tarjeta 1 -->
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card p-2" onclick="mostrarArchivo('archivos/semana1/tarea1.pdf','Tarea 1','pdf')">
          <img src="https://cdn-icons-png.flaticon.com/512/337/337946.png" class="img-fluid" alt="Tarea 1">
          <div class="card-body p-1 text-center">
            <h6 class="card-title">Tarea 1</h6>
            <p class="categoria">PDF</p>
          </div>
        </div>
      </div>

      <!-- Tarjeta 2 -->
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card p-2" onclick="mostrarArchivo('archivos/semana1/informe1.docx','Informe 1','word')">
          <img src="https://cdn-icons-png.flaticon.com/512/281/281760.png" class="img-fluid" alt="Informe 1">
          <div class="card-body p-1 text-center">
            <h6 class="card-title">Informe 1</h6>
            <p class="categoria">Word</p>
          </div>
        </div>
      </div>

      <!-- Tarjeta 3 -->
      <div class="col-6 col-md-4 col-lg-3">
        <div class="card p-2" onclick="mostrarArchivo('archivos/semana1/foto1.jpg','Foto Ejemplo','img')">
          <img src="archivos/semana1/foto1.jpg" class="img-fluid" alt="Foto">
          <div class="card-body p-1 text-center">
            <h6 class="card-title">Foto Ejemplo</h6>
            <p class="categoria">Imagen</p>
          </div>
        </div>
      </div>
    </div>
  </div>

  <!-- Modal -->
  <div class="modal fade" id="visorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-lg modal-dialog-centered">
      <div class="modal-content bg-dark text-white">
        <div class="modal-header border-bottom border-secondary">
          <h5 class="modal-title" id="modalTitulo">Vista previa</h5>
          <button type="button" class="btn-close btn-close-white" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center" id="visorContenido">
          <!-- Aquí se carga el contenido -->
        </div>
        <div class="modal-footer border-top border-secondary">
          <a id="btnVer" target="_blank" class="btn btn-success">Ver</a>
          <a id="btnDescargar" download class="btn btn-secondary">Descargar</a>
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function mostrarArchivo(url, nombre, tipo) {
      document.getElementById("modalTitulo").innerText = nombre;
      document.getElementById("btnVer").href = url;
      document.getElementById("btnDescargar").href = url;

      let contenido = "";
      if (tipo === "pdf") {
        contenido = `<embed src="${url}" type="application/pdf" width="100%" height="500px">`;
      } else if (tipo === "img") {
        contenido = `<img src="${url}" class="img-fluid rounded shadow">`;
      } else if (tipo === "word") {
        contenido = `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${window.location.origin}/${url}" width="100%" height="500px"></iframe>`;
      }

      document.getElementById("visorContenido").innerHTML = contenido;
      new bootstrap.Modal(document.getElementById("visorModal")).show();
    }
  </script>
</body>
</html>
