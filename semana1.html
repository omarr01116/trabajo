<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semana 1 - Mis Chambas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-dark px-3">
    <a href="index.html" class="btn btn-outline-light">⬅️ Volver</a>
    <span class="navbar-brand ms-3">Semana 1</span>
  </nav>

  <div class="container py-5">
    <h2 class="text-center mb-4">Trabajos de la Semana 1</h2>

    <table class="table table-bordered table-hover shadow-sm">
      <thead class="table-dark">
        <tr>
          <th>Nombre del Archivo</th>
          <th>Tipo</th>
          <th>Acciones</th>
        </tr>
      </thead>
      <tbody>
        <tr>
          <td>Tarea 1</td>
          <td>PDF</td>
          <td>
            <button class="btn btn-sm btn-success" 
                    onclick="mostrarArchivo('archivos/semana1/tarea1.pdf','pdf')">Ver</button>
            <a href="archivos/semana1/tarea1.pdf" download class="btn btn-sm btn-secondary">Descargar</a>
          </td>
        </tr>
        <tr>
          <td>Informe 1</td>
          <td>Word</td>
          <td>
            <button class="btn btn-sm btn-success" 
                    onclick="mostrarArchivo('archivos/semana1/informe1.docx','word')">Ver</button>
            <a href="archivos/semana1/informe1.docx" download class="btn btn-sm btn-secondary">Descargar</a>
          </td>
        </tr>
        <tr>
          <td>Imagen Ejemplo</td>
          <td>Imagen</td>
          <td>
            <button class="btn btn-sm btn-success" 
                    onclick="mostrarArchivo('archivos/semana1/foto1.jpg','img')">Ver</button>
            <a href="archivos/semana1/foto1.jpg" download class="btn btn-sm btn-secondary">Descargar</a>
          </td>
        </tr>
      </tbody>
    </table>
  </div>

  <!-- Modal para ver archivos -->
  <div class="modal fade" id="visorModal" tabindex="-1" aria-hidden="true">
    <div class="modal-dialog modal-xl modal-dialog-centered">
      <div class="modal-content">
        <div class="modal-header">
          <h5 class="modal-title">Vista previa del archivo</h5>
          <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
        </div>
        <div class="modal-body text-center" id="visorContenido">
          <!-- Aquí se cargará el archivo -->
        </div>
      </div>
    </div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
  <script>
    function mostrarArchivo(url, tipo) {
      let contenido = "";
      if (tipo === "pdf") {
        contenido = `<embed src="${url}" type="application/pdf" width="100%" height="600px">`;
      } else if (tipo === "img") {
        contenido = `<img src="${url}" class="img-fluid rounded shadow">`;
      } else if (tipo === "word") {
        // Usa el visor online de Office
        contenido = `<iframe src="https://view.officeapps.live.com/op/embed.aspx?src=${window.location.origin}/${url}" 
                      width="100%" height="600px" frameborder="0"></iframe>`;
      }
      document.getElementById("visorContenido").innerHTML = contenido;
      new bootstrap.Modal(document.getElementById("visorModal")).show();
    }
  </script>
</body>
</html>
