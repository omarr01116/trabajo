<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Semana 1 - Repositorio Académico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    /* Navbar neon */
    .navbar {
      background: #0d0d0d;
      border-bottom: 1px solid rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    }

    .navbar-brand {
      font-weight: bold;
      color: #0ff !important;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      transition: transform 0.3s ease;
    }

    .navbar-brand:hover {
      transform: scale(1.1);
    }

    .btn-outline-light {
      border: 1px solid #0ff;
      color: #0ff;
      transition: all 0.3s;
    }

    .btn-outline-light:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 10px #0ff;
    }

    /* Título principal */
    h2 {
      color: #0ff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      text-align: center;
      margin-bottom: 30px;
    }

    /* Tabla neon */
    .table {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    .table th {
      background: #0ff;
      color: #000;
      text-align: center;
    }

    .table td {
      vertical-align: middle;
      color: #e0e0e0;
    }

    .btn-sm {
      font-size: 0.85rem;
      padding: 5px 10px;
    }

    /* Footer */
    footer {
      background: #111;
      color: #777;
      border-top: 1px solid #333;
      margin-top: 50px;
      padding: 15px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-lightning-charge-fill"></i> Omar
    </a>
    <div class="ms-auto">
      <a href="login.html" class="btn btn-outline-light">
        <i class="bi bi-box-arrow-in-right"></i> Login
      </a>
    </div>
  </nav>

  <!-- Contenido -->
  <div class="container py-5">
    <h2>Semana 1 - Archivos Subidos</h2>

    <div class="table-responsive">
      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre del archivo</th>
            <th>Fecha de subida</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody>
          <!-- Aquí se generan dinámicamente los archivos -->
          <tr>
            <td>1</td>
            <td>informe1.pdf</td>
            <td>12/09/2025</td>
            <td class="text-center">
              <a href="uploads/informe1.pdf" target="_blank" class="btn btn-sm btn-primary">
                <i class="bi bi-eye"></i> Ver
              </a>
              <a href="uploads/informe1.pdf" download class="btn btn-sm btn-outline-light">
                <i class="bi bi-download"></i> Descargar
              </a>
            </td>
          </tr>
          <tr>
            <td>2</td>
            <td>tarea.docx</td>
            <td>12/09/2025</td>
            <td class="text-center">
              <a href="uploads/tarea.docx" target="_blank" class="btn btn-sm btn-primary">
                <i class="bi bi-eye"></i> Ver
              </a>
              <a href="uploads/tarea.docx" download class="btn btn-sm btn-outline-light">
                <i class="bi bi-download"></i> Descargar
              </a>
            </td>
          </tr>
          <!-- Más archivos se agregan aquí -->
        </tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center">
    © 2025 Omar - Repositorio académico
  </footer>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
