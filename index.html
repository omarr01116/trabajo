<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Repositorio de Trabajos - Omar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    .navbar {
      background: #111;
      border-bottom: 2px solid #0ff;
      box-shadow: 0 0 15px #0ff, 0 0 25px #00f;
    }
    .navbar-brand {
      color: #0ff !important;
      font-weight: bold;
      text-shadow: 0 0 10px #0ff;
    }
    .btn-logout {
      background: linear-gradient(90deg, #f0f, #0ff);
      border: none;
      color: #000;
      font-weight: bold;
      padding: 5px 12px;
      border-radius: 10px;
      margin-left: 15px;
    }
    .btn-logout:hover {
      box-shadow: 0 0 15px #0ff, 0 0 25px #f0f;
    }
    .card {
      background: #111;
      border: 2px solid #f0f;
      border-radius: 15px;
      box-shadow: 0 0 15px #f0f, 0 0 25px #0ff;
      color: #fff;
    }
    .btn-primary {
      background: linear-gradient(90deg, #0ff, #f0f);
      border: none;
      font-weight: bold;
      color: #000;
    }
    .btn-primary:hover {
      box-shadow: 0 0 15px #0ff, 0 0 25px #f0f;
    }
    footer {
      border-top: 1px solid #0ff;
      box-shadow: 0 0 10px #0ff;
      color: #0ff;
    }
  </style>
</head>
<body>

  <script>
    let usuarioId = localStorage.getItem("usuario_id");
    if (!usuarioId) {
      window.location.href = "./login.html";
    }
  </script>

  <nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand" href="#">
      <i class="bi bi-lightning-charge-fill"></i> Omar
    </a>
    <div class="ms-auto d-flex align-items-center">
      <span id="usuarioNombre"></span>
      <button onclick="logout()" class="btn-logout">
        <i class="bi bi-box-arrow-right"></i> Salir
      </button>
    </div>
  </nav>

  <div class="container py-5">
    <h2 class="text-center mb-4">Repositorio Académico</h2>
    <p class="text-center text-muted mb-5">Selecciona la semana que deseas consultar para ver los trabajos disponibles.</p>
    <div class="row justify-content-center g-4">
      <div class="col-md-4">
        <div class="card text-center p-3">
          <div class="card-body">
            <h5 class="card-title">Semana 1</h5>
            <p class="card-text">Trabajos y actividades iniciales.</p>
            <a href="./semana.html?semana=1" class="btn btn-primary mt-2">
              <i class="bi bi-folder2-open"></i> Ver trabajos
            </a>
          </div>
        </div>
      </div>
      <!-- Puedes duplicar esta card para más semanas -->
    </div>
  </div>

  <footer class="text-center py-3 mt-5">
    © 2025 Omar - Repositorio académico
  </footer>

  <script>
    const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];
    const usuarioIdStored = localStorage.getItem("usuario_id");
    if (usuarioIdStored) {
      const user = usuarios.find(u => u.id == usuarioIdStored);
      if (user) {
        document.getElementById("usuarioNombre").textContent = "👤 " + user.usuario;
        document.getElementById("usuarioNombre").style.color = "#0ff";
        document.getElementById("usuarioNombre").style.textShadow = "0 0 10px #0ff, 0 0 20px #f0f";
      }
    }

    function logout() {
      localStorage.removeItem("usuario_id");
      window.location.href = "./login.html";
    }
  </script>

</body>
</html>
