<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #0ff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 30px;
      text-align: center;
    }
    .card {
      background: #111;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    }
    .btn-custom {
      background: #0ff;
      color: #000;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #ff00ff;
      color: #fff;
    }
    .btn-secondary {
      background: #444;
      border: none;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h1 id="tituloSemana">Trabajos</h1>
  <div id="listaArchivos" class="row g-4">
    <!-- Aquí se mostrarán los archivos -->
  </div>

  <div class="text-center mt-4">
    <a href="./index.html" class="btn btn-secondary">⬅️ Volver a inicio</a>
  </div>
</div>

<!-- Supabase -->
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // 🔑 Configuración Supabase
  const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 📌 Obtener semana desde la URL
  const params = new URLSearchParams(window.location.search);
  const semana = "Semana " + (params.get("semana") || "1");

  document.getElementById("tituloSemana").textContent = semana;

  const listaArchivos = document.getElementById("listaArchivos");

  // 📂 Cargar archivos de esa semana
  async function cargarArchivos() {
    const { data, error } = await supabase.storage
      .from("archivos")
      .list(semana + "/", { limit: 100 }); // 👈 Aseguramos que busca dentro de la carpeta

    listaArchivos.innerHTML = "";

    if (error) {
      listaArchivos.innerHTML = `
        <div class="col-12 text-center text-danger">
          <p>❌ Error al listar: ${error.message}</p>
        </div>
      `;
      return;
    }

    if (!data || data.length === 0) {
      listaArchivos.innerHTML = `
        <div class="col-12 text-center text-muted">
          <p>⚠️ No hay archivos para esta semana.</p>
        </div>
      `;
      return;
    }

    for (const file of data) {
      const { data: urlData } = await supabase.storage
        .from("archivos")
        .getPublicUrl(`${semana}/${file.name}`); // 👈 Ruta correcta

      const fecha = file.updated_at
        ? new Date(file.updated_at).toLocaleString()
        : "Sin fecha";

      const col = document.createElement("div");
      col.className = "col-md-4";

      col.innerHTML = `
        <div class="card h-100 p-3 text-center">
          <h5 class="card-title">${file.name}</h5>
          <p class="card-text"><small>${fecha}</small></p>
          <div class="d-grid gap-2">
            <a href="${urlData.publicUrl}" target="_blank" class="btn btn-custom">👁 Ver</a>
            <a href="${urlData.publicUrl}" download="${file.name}" class="btn btn-custom">⬇ Descargar</a>
          </div>
        </div>
      `;

      listaArchivos.appendChild(col);
    }
  }

  cargarArchivos();
</script>

</body>
</html>
