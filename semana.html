<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Repositorio Académico - Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .navbar {
      background: #0d0d0d;
      border-bottom: 1px solid rgba(0, 255, 255, 0.4);
      box-shadow: 0 0 10px rgba(0, 255, 255, 0.2);
    }

    .navbar-brand {
      font-weight: bold;
      color: #0ff !important;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      transition: transform 0.3s ease;
    }

    .navbar-brand:hover {
      transform: scale(1.1);
    }

    .btn-outline-light {
      border: 1px solid #0ff;
      color: #0ff;
      transition: all 0.3s;
    }

    .btn-outline-light:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 10px #0ff;
    }

    h2 {
      color: #0ff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      text-align: center;
      margin-bottom: 30px;
    }

    .table {
      background: #1a1a1a;
      border-radius: 10px;
      overflow: hidden;
      box-shadow: 0 0 10px rgba(0,255,255,0.2);
    }

    .table th {
      background: #0ff;
      color: #000;
      text-align: center;
    }

    .table td {
      vertical-align: middle;
      color: #e0e0e0;
    }

    .btn-sm {
      font-size: 0.85rem;
      padding: 5px 10px;
    }

    footer {
      background: #111;
      color: #777;
      border-top: 1px solid #333;
      margin-top: 50px;
      padding: 15px;
    }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-lightning-charge-fill"></i> Omar
    </a>
    <div class="ms-auto">
      <a href="login.html" class="btn btn-outline-light">
        <i class="bi bi-box-arrow-in-right"></i> Login
      </a>
    </div>
  </nav>

  <!-- Contenido -->
  <div class="container py-5">
    <h2 id="tituloSemana">Archivos Subidos</h2>

    <div class="table-responsive">
      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre del archivo</th>
            <th>Fecha de subida</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="tablaArchivos">
          <tr>
            <td colspan="4" class="text-center">⏳ Cargando archivos...</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>

  <footer class="text-center">
    © 2025 Omar - Repositorio académico
  </footer>

  <!-- Firebase SDK -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, orderBy } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔹 Configuración de tu proyecto Firebase
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT_ID.firebaseapp.com",
      projectId: "TU_PROJECT_ID",
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // Leer parámetros de la URL (ej: semana.html?semana=semana1)
    const params = new URLSearchParams(window.location.search);
    const semana = params.get("semana");

    // Actualizar título dinámico
    document.getElementById("tituloSemana").textContent = `Archivos de ${semana}`;

    async function cargarArchivos() {
      const tbody = document.getElementById("tablaArchivos");
      tbody.innerHTML = `<tr><td colspan="4" class="text-center">⏳ Cargando...</td></tr>`;

      try {
        const q = query(
          collection(db, "trabajos"),
          where("semana", "==", semana),
          orderBy("fecha", "desc")
        );

        const querySnapshot = await getDocs(q);

        if (querySnapshot.empty) {
          tbody.innerHTML = `<tr><td colspan="4" class="text-center">⚠️ No hay archivos para esta semana</td></tr>`;
          return;
        }

        tbody.innerHTML = "";
        let index = 1;

        querySnapshot.forEach((doc) => {
          const data = doc.data();
          const fecha = data.fecha?.toDate ? data.fecha.toDate().toLocaleDateString() : "—";

          // Crear enlace temporal desde Base64
          const base64Data = data.archivo;
          const mimeType = data.tipo || "application/octet-stream";
          const fileBlob = base64Data ? b64toBlob(base64Data, mimeType) : null;
          const url = fileBlob ? URL.createObjectURL(fileBlob) : "#";

          tbody.innerHTML += `
            <tr>
              <td>${index++}</td>
              <td>${data.nombreArchivo}</td>
              <td>${fecha}</td>
              <td class="text-center">
                <a href="${url}" target="_blank" class="btn btn-sm btn-primary">
                  <i class="bi bi-eye"></i> Ver
                </a>
                <a href="${url}" download="${data.nombreArchivo}" class="btn btn-sm btn-outline-light">
                  <i class="bi bi-download"></i> Descargar
                </a>
              </td>
            </tr>
          `;
        });
      } catch (err) {
        console.error("Error cargando archivos:", err);
        tbody.innerHTML = `<tr><td colspan="4" class="text-center text-danger">❌ Error al cargar archivos</td></tr>`;
      }
    }

    // Función auxiliar para convertir Base64 → Blob
    function b64toBlob(base64, mimeType) {
      const byteChars = atob(base64);
      const byteNumbers = new Array(byteChars.length);
      for (let i = 0; i < byteChars.length; i++) {
        byteNumbers[i] = byteChars.charCodeAt(i);
      }
      const byteArray = new Uint8Array(byteNumbers);
      return new Blob([byteArray], { type: mimeType });
    }

    cargarArchivos();
  </script>

  <script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/js/bootstrap.bundle.min.js"></script>
</body>
</html>
