<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archivos por Semana</title>
  <link rel="stylesheet" href="styles.css">
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js"></script>
  <script src="https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js"></script>
</head>
<body>
  <h2>📂 Archivos de <span id="titulo-semana"></span></h2>
  <button onclick="window.location.href='upload.html'">⬅ Volver al Inicio</button>

  <table border="1" style="margin-top:20px; width:80%; text-align:center;">
    <thead>
      <tr>
        <th>Archivo</th>
        <th>Fecha</th>
        <th>Acción</th>
      </tr>
    </thead>
    <tbody id="lista-archivos">
    </tbody>
  </table>

  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/9.22.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, deleteDoc, doc } 
      from "https://www.gstatic.com/firebasejs/9.22.2/firebase-firestore.js";

    // 🔹 Configuración de Firebase
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_AUTH_DOMAIN",
      projectId: "TU_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔹 Leer parámetros de la URL
    const params = new URLSearchParams(window.location.search);
    const semanaSeleccionada = params.get("semana");
    document.getElementById("titulo-semana").innerText = semanaSeleccionada;

    const listaArchivos = document.getElementById("lista-archivos");

    async function cargarArchivos() {
      listaArchivos.innerHTML = "";

      const q = query(
        collection(db, "archivos"),
        where("semana", "==", semanaSeleccionada)
      );

      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        listaArchivos.innerHTML = `
          <tr><td colspan="3">⚠ No hay archivos en ${semanaSeleccionada}.</td></tr>`;
        return;
      }

      querySnapshot.forEach((docSnap) => {
        const data = docSnap.data();

        // 🔹 Convertir timestamp a fecha legible
        let fechaLegible = "";
        if (data.fecha && data.fecha.toDate) {
          fechaLegible = data.fecha.toDate().toLocaleString();
        }

        const fila = document.createElement("tr");
        fila.innerHTML = `
          <td>${data.NombreArchivo}</td>
          <td>${fechaLegible}</td>
          <td><button onclick="borrarArchivo('${docSnap.id}')">Borrar</button></td>
        `;
        listaArchivos.appendChild(fila);
      });
    }

    // 🔹 Función para borrar un archivo
    window.borrarArchivo = async function (id) {
      if (confirm("¿Seguro que deseas borrar este archivo?")) {
        await deleteDoc(doc(db, "archivos", id));
        cargarArchivos(); // refresca la tabla
      }
    };

    cargarArchivos();
  </script>
</body>
</html>
