<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link rel="stylesheet" href="css/semana.css">
</head>
<body>

<div class="container py-5">
  <!-- Encabezado -->
  <div class="d-flex justify-content-between align-items-center mb-4">
    <h1 id="tituloSemana" class="titulo-principal">Trabajos</h1>
    <a href="./index.html" class="btn btn-volver">⬅️ Volver a inicio</a>
  </div>

  <div class="row g-4">
    <!-- Lista de archivos -->
    <div class="col-md-4">
      <div class="card lista-card shadow-sm p-3">
        <h4 class="mb-3 text-center text-acento">📂 Archivos</h4>
        <div id="listaArchivos" class="row g-3">
          <!-- Archivos aquí -->
        </div>
      </div>
    </div>

    <!-- Vista previa -->
    <div class="col-md-8">
      <div class="card preview-card shadow-sm p-3">
        <h4 class="mb-3 text-center text-acento">👁 Vista previa</h4>
        <div id="preview">
          <p class="text-muted">Selecciona un archivo para ver su vista previa aquí.</p>
        </div>
      </div>
    </div>
  </div>
</div>

<!-- Script externo -->
<script type="module" src="js/semana.js"></script>
</body>
</html>
