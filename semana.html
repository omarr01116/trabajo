<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
      font-family: Arial, sans-serif;
    }
    h1 {
      color: #0ff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 30px;
      text-align: center;
    }
    .card {
      background: #111;
      border-radius: 15px;
      box-shadow: 0 0 15px rgba(0,255,255,0.4);
      transition: transform 0.3s, box-shadow 0.3s;
    }
    .card:hover {
      transform: translateY(-8px) scale(1.03);
      box-shadow: 0 0 20px #0ff, 0 0 40px #0ff;
    }
    .btn-custom {
      background: #0ff;
      color: #000;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #ff00ff;
      color: #fff;
    }
    .btn-secondary {
      background: #444;
      border: none;
    }
  </style>
</head>
<body>

<div class="container py-5">
  <h1 id="tituloSemana">Trabajos</h1>
  <div id="listaArchivos" class="row g-4">
    <!-- Aquí se mostrarán los archivos -->
  </div>

  <div class="text-center mt-4">
    <a href="./index.html" class="btn btn-secondary">⬅️ Volver a inicio</a>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
  import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

  // Configuración Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDGayNF28OA_WLc0hSTtATeDHDrPK2r2vY",
    authDomain: "trabajo-3d72f.firebaseapp.com",
    projectId: "trabajo-3d72f",
    storageBucket: "trabajo-3d72f.appspot.com",
    messagingSenderId: "1041599599176",
    appId: "1:1041599599176:web:ac463901916c8c91a3be7d",
    measurementId: "G-WE0X8C5X2Z"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Obtener semana desde la URL
  const params = new URLSearchParams(window.location.search);
  const semana = "Semana " + (params.get("semana") || "1");

  document.getElementById("tituloSemana").textContent = semana;

  const listaArchivos = document.getElementById("listaArchivos");

  // Cargar archivos de esa semana
  async function cargarArchivos() {
    const q = query(collection(db, "archivos"), where("semana", "==", semana));
    const querySnapshot = await getDocs(q);

    listaArchivos.innerHTML = "";

    if (querySnapshot.empty) {
      listaArchivos.innerHTML = `
        <div class="col-12 text-center text-muted">
          <p>⚠️ No hay archivos para esta semana.</p>
        </div>
      `;
      return;
    }

    querySnapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const fecha = data.fecha?.toDate ? data.fecha.toDate().toLocaleString() : "Sin fecha";
      const url = data.url || "#";

      const col = document.createElement("div");
      col.className = "col-md-4";

      col.innerHTML = `
        <div class="card h-100 p-3 text-center">
          <h5 class="card-title">${data.NombreArchivo}</h5>
          <p class="card-text"><small>${fecha}</small></p>
          <div class="d-grid gap-2">
            <a href="${url}" target="_blank" class="btn btn-custom">👁 Ver</a>
            <a href="${url}" download="${data.NombreArchivo}" class="btn btn-custom">⬇ Descargar</a>
          </div>
        </div>
      `;

      listaArchivos.appendChild(col);
    });
  }

  cargarArchivos();
</script>

</body>
</html>
