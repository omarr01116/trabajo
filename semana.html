<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Archivos por Semana - Repositorio Académico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body { background-color: #0d0d0d; color: #e0e0e0; font-family: 'Segoe UI', sans-serif; }
    .navbar { background: #0d0d0d; border-bottom: 1px solid rgba(0, 255, 255, 0.4); }
    .navbar-brand { font-weight: bold; color: #0ff !important; text-shadow: 0 0 10px #0ff; }
    h2 { color: #0ff; text-shadow: 0 0 10px #0ff; text-align: center; margin-bottom: 30px; }
    .table { background: #1a1a1a; border-radius: 10px; }
    .table th { background: #0ff; color: #000; text-align: center; }
    .table td { vertical-align: middle; color: #e0e0e0; }
    footer { background: #111; color: #777; border-top: 1px solid #333; margin-top: 50px; padding: 15px; }
  </style>
</head>
<body>

  <!-- Navbar -->
  <nav class="navbar navbar-expand-lg px-3">
    <a class="navbar-brand" href="index.html">
      <i class="bi bi-lightning-charge-fill"></i> Omar
    </a>
  </nav>

  <!-- Contenido -->
  <div class="container py-5">
    <h2 id="titulo-semana">Archivos Subidos</h2>
    <div class="table-responsive">
      <table class="table table-dark table-hover align-middle">
        <thead>
          <tr>
            <th>#</th>
            <th>Nombre del archivo</th>
            <th>Fecha de subida</th>
            <th>Acciones</th>
          </tr>
        </thead>
        <tbody id="lista-archivos">
          <tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>
        </tbody>
      </table>
    </div>
  </div>

  <!-- Footer -->
  <footer class="text-center">
    © 2025 Omar - Repositorio académico
  </footer>

  <!-- Firebase -->
  <script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

    // 🔹 Tu configuración de Firebase
    const firebaseConfig = {
      apiKey: "TU_API_KEY",
      authDomain: "TU_PROJECT_ID.firebaseapp.com",
      projectId: "TU_PROJECT_ID",
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);

    // 🔹 Obtener la semana desde la URL
    const params = new URLSearchParams(window.location.search);
    const semana = params.get("semana") || "semana1"; 

    document.getElementById("titulo-semana").textContent = `Archivos - ${semana}`;

    // 🔹 Consultar archivos de esa semana en Firestore
    async function cargarArchivos() {
      const lista = document.getElementById("lista-archivos");
      lista.innerHTML = `<tr><td colspan="4" class="text-center text-muted">Cargando...</td></tr>`;

      const q = query(collection(db, "archivos"), where("semana", "==", semana));
      const querySnapshot = await getDocs(q);

      if (querySnapshot.empty) {
        lista.innerHTML = `<tr><td colspan="4" class="text-center text-muted">No hay archivos subidos en esta semana.</td></tr>`;
        return;
      }

      lista.innerHTML = "";
      let i = 1;
      querySnapshot.forEach(doc => {
        const data = doc.data();
        const fecha = data.fecha?.toDate().toLocaleDateString() || "Sin fecha";
        lista.innerHTML += `
          <tr>
            <td>${i++}</td>
            <td>${data.NombreArchivo}</td>
            <td>${fecha}</td>
            <td class="text-center">
              <a href="${data.url}" target="_blank" class="btn btn-sm btn-primary">
                <i class="bi bi-eye"></i> Ver
              </a>
              <a href="${data.url}" download class="btn btn-sm btn-outline-light">
                <i class="bi bi-download"></i> Descargar
              </a>
            </td>
          </tr>
        `;
      });
    }

    cargarArchivos();
  </script>

</body>
</html>
