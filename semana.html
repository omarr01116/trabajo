<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0d0d0d; color:#e0e0e0; font-family: Arial, sans-serif; }
    h1 { color:#0ff; text-shadow:0 0 10px #0ff; text-align:center; margin-bottom:30px; }
    .card { background:#111; border-radius:12px; box-shadow:0 0 15px rgba(0,255,255,0.4); }
    .btn-custom { background:#0ff; color:#000; font-weight:bold; }
    .btn-custom:hover { background:#ff00ff; color:#fff; }
  </style>
</head>
<body>

<div class="container py-5">
  <h1 id="tituloSemana">Trabajos</h1>
  <div id="listaArchivos" class="row g-4"></div>

  <div class="text-center mt-4">
    <a href="./index.html" class="btn btn-secondary">⬅️ Volver a inicio</a>
  </div>
</div>

<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // Configuración Supabase
  const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // Obtener número de semana desde la URL
  const params = new URLSearchParams(window.location.search);
  const semanaNum = params.get("semana") || "1";
  const carpeta = `Semana ${semanaNum}`;

  document.getElementById("tituloSemana").textContent = `Trabajos - ${carpeta}`;

  const listaArchivos = document.getElementById("listaArchivos");

  async function cargarArchivos() {
    const { data, error } = await supabase.storage.from("archivos").list(carpeta, { limit: 100 });

    listaArchivos.innerHTML = "";

    if (error) {
      listaArchivos.innerHTML = `<p class="text-danger text-center">❌ Error al listar: ${error.message}</p>`;
      return;
    }

    if (!data || data.length === 0) {
      listaArchivos.innerHTML = `<p class="text-muted text-center">⚠️ No hay archivos en ${carpeta}.</p>`;
      return;
    }

    for (const file of data) {
      const { data: urlData } = supabase.storage.from("archivos").getPublicUrl(`${carpeta}/${file.name}`);
      const url = urlData?.publicUrl;

      const col = document.createElement("div");
      col.className = "col-md-4";

      col.innerHTML = `
        <div class="card h-100 p-3 text-center">
          <h5 class="card-title">${file.name}</h5>
          <p class="card-text"><small>${file.updated_at || ""}</small></p>
          <div class="d-grid gap-2">
            <a href="${url}" target="_blank" class="btn btn-custom">👁 Ver</a>
            <a href="${url}" download="${file.name}" class="btn btn-custom">⬇ Descargar</a>
          </div>
        </div>
      `;

      listaArchivos.appendChild(col);
    }
  }

  cargarArchivos();
</script>

</body>
</html>
