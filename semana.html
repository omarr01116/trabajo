<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0d0d0d; color:#e0e0e0; font-family: Arial, sans-serif; }
    header { display:flex; justify-content:space-between; align-items:center; margin:30px 0; }
    h1 { color:#0ff; text-shadow:0 0 10px #0ff; }
    .card { background:#111; border-radius:10px; padding:15px; box-shadow:0 0 10px rgba(0,255,255,0.4); }
    .preview-img { max-width:100%; max-height:180px; object-fit:contain; margin-bottom:10px; }
    iframe.preview-pdf { width:100%; height:220px; border:0; border-radius:8px; margin-bottom:10px; }
    .btn-custom { background:#0ff; color:#000; font-weight:bold; }
    .btn-custom:hover { background:#ff00ff; color:#fff; }
    .debug { color:#bbb; font-size:0.9rem; margin-top:10px; }
  </style>
</head>
<body>
  <div class="container">
    <header>
      <h1 id="tituloSemana">Trabajos</h1>
      <div>
        <a href="index.html" class="btn btn-outline-light">← Volver</a>
      </div>
    </header>

    <div id="listaArchivos" class="row g-4"></div>
    <div id="mensajes" class="debug"></div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const params = new URLSearchParams(window.location.search);
    const semanaNum = params.get("semana") || "1";
    const carpeta = `Semana ${semanaNum}`;  // usando espacio

    document.getElementById("tituloSemana").textContent = `Trabajos - ${carpeta}`;

    const listaEl = document.getElementById("listaArchivos");
    const mensajesEl = document.getElementById("mensajes");

    async function cargar() {
      // limpia mensajes
      mensajesEl.textContent = "";
      listaEl.innerHTML = "";

      appendMsg(`Buscando archivos en carpeta: "${carpeta}"`);

      const { data, error } = await supabase.storage.from("archivos").list(carpeta, { limit: 200 });

      if (error) {
        appendMsg(`Error al listar: ${error.message}`);
        // Si es error de permisos
        if (/permission|forbidden|not authorized|auth/i.test(error.message)) {
          appendMsg("Necesitas iniciar sesión para ver estos archivos.");
        }
        return;
      }

      if (!data || data.length === 0) {
        appendMsg(`No hay archivos en la carpeta "${carpeta}".`);
        return;
      }

      appendMsg(`Encontrados ${data.length} archivo(s). Mostrando...`);
      for (const f of data) {
        const name = f.name;
        const path = `${carpeta}/${name}`;

        // obtener public url
        const { data: urlObj, error: urlErr } = await supabase.storage.from("archivos").getPublicUrl(path);
        const publicUrl = urlObj?.publicUrl;

        // preview según extensión
        let preview = `<div style="height:180px; display:flex; align-items:center; justify-content:center; color:#999; background:#0b0b0b; border-radius:8px; margin-bottom:10px;">Sin vista previa</div>`;
        if (publicUrl) {
          const ext = name.split(".").pop().toLowerCase();
          if (["png","jpg","jpeg","bmp","gif","webp"].includes(ext)) {
            preview = `<img src="${publicUrl}" class="preview-img" alt="${name}">`;
          } else if (ext === "pdf") {
            preview = `<iframe class="preview-pdf" src="${publicUrl}"></iframe>`;
          }
        }

        const col = document.createElement("div");
        col.className = "col-md-4";

        col.innerHTML = `
          <div class="card h-100 text-center">
            ${preview}
            <h5 class="card-title" style="word-break:break-word">${name}</h5>
            <p class="small text-muted">${f.updated_at || ""}</p>
            <div class="d-flex justify-content-center gap-2">
              ${publicUrl ? `<a href="${publicUrl}" target="_blank" class="btn btn-custom btn-sm">👁 Ver</a>` : `<button class="btn btn-secondary btn-sm" disabled>Ver</button>`}
              ${publicUrl ? `<a href="${publicUrl}" download="${encodeURIComponent(name)}" class="btn btn-custom btn-sm">⬇ Descargar</a>` : `<button class="btn btn-secondary btn-sm" disabled>Descargar</button>`}
            </div>
          </div>
        `;

        listaEl.appendChild(col);
      }
    }

    function appendMsg(text) {
      const p = document.createElement("div");
      p.textContent = text;
      mensajesEl.appendChild(p);
    }

    // Ejecutar al cargar
    cargar();
  </script>
</body>
</html>
