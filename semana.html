<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body { background:#0d0d0d; color:#e0e0e0; font-family: Arial, sans-serif; }
    h1 { color:#0ff; text-align:center; margin-bottom:24px; text-shadow: 0 0 10px #0ff; }
    .card { background:#111; border-radius:12px; padding:12px; box-shadow:0 0 12px rgba(0,255,255,0.12); }
    .preview-img { max-width:100%; max-height:160px; object-fit:contain; display:block; margin:0 auto 8px; }
    .meta { font-size:0.85rem; color:#bbb; }
    .debug { font-size:0.85rem; color:#ddd; margin-top:12px; }
    .btn-custom { background:#0ff; color:#000; font-weight:700; }
    .btn-custom:hover { background:#ff00ff; color:#fff; }
  </style>
</head>
<body>
  <div class="container py-5">
    <div class="d-flex justify-content-between align-items-center mb-3">
      <h1 id="tituloSemana">Trabajos</h1>
      <a href="index.html" class="btn btn-sm btn-outline-light">← Volver</a>
    </div>

    <div id="listaArchivos" class="row g-4"></div>

    <div id="mensajes" class="mt-4"></div>
    <div class="text-center mt-4">
      <a href="./index.html" class="btn btn-secondary">⬅️ Volver a inicio</a>
    </div>
  </div>

  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // --- Credenciales Supabase (tus valores)
    const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    // --- Obtener parámetro ?semana=1 (o valor por defecto '1')
    const params = new URLSearchParams(window.location.search);
    const rawSemanaParam = params.get("semana") || "1";
    // Representación visible
    const visibleSemana = isNaN(rawSemanaParam) ? rawSemanaParam : `Semana ${rawSemanaParam}`;
    document.getElementById("tituloSemana").textContent = visibleSemana;

    // --- Genera variantes de carpeta para probar
    function generarVariantes(n) {
      const trimmed = String(n).trim();
      // si el usuario pasa 'Semana 1' ya, eliminar prefijo repetido:
      const num = trimmed.replace(/^Semana\s*/i, "").replace(/^semana\s*/i, "");
      const variants = [
        `Semana ${num}`,
        `Semana${num}`,
        `Semana_${num}`,
        `semana ${num}`,
        `semana${num}`,
        `semana_${num}`,
        `${num}`,
      ];
      // Añadir con mayúsculas normalizadas (por si)
      return Array.from(new Set(variants));
    }

    const listaArchivosEl = document.getElementById("listaArchivos");
    const mensajesEl = document.getElementById("mensajes");

    // --- Intentar listar usando distintas carpetas hasta que haya resultados
    async function encontrarYCargar() {
      listaArchivosEl.innerHTML = "";
      mensajesEl.innerHTML = "";

      const variantes = generarVariantes(rawSemanaParam);
      appendDebug(`Probando variantes de carpeta: ${variantes.join(", ")}`);

      for (const varName of variantes) {
        // probamos con y sin barra final
        const pruebas = [varName, varName + "/", varName.replace(/\s+/g, "_"), varName.replace(/\s+/g, "")];
        for (const pref of pruebas) {
          appendDebug(`Intentando listar: "${pref}"`);
          try {
            const { data, error } = await supabase.storage.from("archivos").list(pref, { limit: 200 });
            if (error) {
              appendDebug(` -> Error (list): ${error.message}`);
              // si es permiso denegado, mostrar sugerencia y continuar intentando otras variantes
              if (/permission|not authorized|forbidden/i.test(error.message)) {
                appendWarning("Parece que la política de Storage requiere autenticación para LISTAR. Si quieres que cualquiera vea los archivos desde semana.html, cambia las policies del bucket o haz que esta página solicite login.");
              }
              continue;
            }
            if (!data || data.length === 0) {
              appendDebug(` -> No hay archivos en "${pref}"`);
              continue;
            }
            // SI llegamos aquí, hay archivos: cargarlos y terminar
            appendDebug(` -> Encontrados ${data.length} archivos en "${pref}"`);
            renderFiles(pref.replace(/\/$/, ""), data);
            return;
          } catch (err) {
            appendDebug(` -> Excepción: ${err?.message || err}`);
            continue;
          }
        }
      }

      // Si llegamos aquí no se encontró nada en ninguna variante
      appendWarning("No se encontraron archivos para la semana en ninguna variante de carpeta. Revisa el nombre exacto de la carpeta en Supabase Storage (ej: 'Semana 1' o 'Semana1'), y verifica las policies de acceso.");
    }

    // --- Renderiza los archivos en la UI
    async function renderFiles(prefix, files) {
      listaArchivosEl.innerHTML = "";
      // files es array de objetos { name, id, updated_at, metadata, ... }
      for (const file of files) {
        // Construir ruta segura sin doble slash
        const path = prefix ? `${prefix}/${file.name}` : file.name;
        // Obtener public url
        const { data: urlData, error: urlError } = await supabase.storage.from("archivos").getPublicUrl(path);
        const publicUrl = urlData?.publicUrl ?? null;

        const updated = file.updated_at ? new Date(file.updated_at).toLocaleString() : "—";

        const col = document.createElement("div");
        col.className = "col-md-4";

        // Derivar preview por extensión
        const ext = (file.name.split(".").pop() || "").toLowerCase();
        let previewHtml = "";
        if (["png","jpg","jpeg","gif","webp","bmp"].includes(ext) && publicUrl) {
          previewHtml = `<img src="${publicUrl}" alt="${file.name}" class="preview-img" />`;
        } else if (ext === "pdf" && publicUrl) {
          previewHtml = `<iframe src="${publicUrl}" style="width:100%;height:260px;border:0;border-radius:8px;display:block;margin-bottom:8px;"></iframe>`;
        } else {
          // icono genérico o info
          previewHtml = `<div style="height:160px;display:flex;align-items:center;justify-content:center;color:#999;background:#0b0b0b;border-radius:8px;margin-bottom:8px;">No hay vista previa</div>`;
        }

        const verBtn = publicUrl ? `<a href="${publicUrl}" target="_blank" class="btn btn-custom">👁 Ver</a>` : `<button class="btn btn-secondary" disabled>Ver</button>`;
        const dlBtn = publicUrl ? `<a href="${publicUrl}" download="${file.name}" class="btn btn-custom">⬇ Descargar</a>` : `<button class="btn btn-secondary" disabled>Descargar</button>`;

        col.innerHTML = `
          <div class="card h-100 p-3 text-center">
            ${previewHtml}
            <h5 class="card-title" style="word-break:break-word">${escapeHtml(file.name)}</h5>
            <p class="meta mb-2">${escapeHtml(updated)}</p>
            <div class="d-flex gap-2 justify-content-center">
              ${verBtn}
              ${dlBtn}
            </div>
          </div>
        `;
        listaArchivosEl.appendChild(col);
      }
    }

    // --- Helpers UI
    function appendDebug(text) {
      const p = document.createElement("div");
      p.className = "debug";
      p.textContent = text;
      mensajesEl.appendChild(p);
    }
    function appendWarning(text) {
      const p = document.createElement("div");
      p.className = "debug";
      p.style.color = "#ffcc66";
      p.textContent = text;
      mensajesEl.appendChild(p);
    }
    function escapeHtml(s) {
      return String(s).replace(/[&<>"']/g, (m) => ({ "&":"&amp;","<":"&lt;",">":"&gt;",'"':"&quot;","'":"&#39;" }[m]));
    }

    // Ejecutar búsqueda + carga
    encontrarYCargar();
  </script>
</body>
</html>
