<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<div class="container py-5">
  <h1 id="tituloSemana">Trabajos</h1>
  <div id="listaArchivos" class="row g-4">
    <!-- Aquí se mostrarán los archivos -->
  </div>

  <div class="text-center mt-4">
    <a href="./index.html" class="btn btn-secondary">⬅️ Volver a inicio</a>
  </div>
</div>

<!-- Supabase -->
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // 🔑 Configuración Supabase
  const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 📌 Obtener número de semana desde la URL
  const params = new URLSearchParams(window.location.search);
  const semanaNumero = params.get("semana") || "1";
  const carpeta = `Semana ${semanaNumero}`;

  // Mostrar título
  document.getElementById("tituloSemana").textContent = `Trabajos - ${carpeta}`;

  const listaArchivos = document.getElementById("listaArchivos");

  // 📂 Cargar archivos de esa semana
  async function cargarArchivos() {
    console.log(`📂 Buscando archivos en carpeta: "${carpeta}"`);

    const { data, error } = await supabase.storage
      .from("archivos")
      .list(carpeta, { limit: 100 });

    listaArchivos.innerHTML = "";

    if (error) {
      console.error("❌ Error:", error.message);
      listaArchivos.innerHTML = `
        <div class="col-12 text-center text-danger">
          <p>❌ Error al listar: ${error.message}</p>
        </div>
      `;
      return;
    }

    if (!data || data.length === 0) {
      listaArchivos.innerHTML = `
        <div class="col-12 text-center text-muted">
          <p>⚠️ No hay archivos en la carpeta "${carpeta}".</p>
        </div>
      `;
      return;
    }

    for (const file of data) {
      // ✅ Generar URL pública
      const { data: urlData } = supabase.storage
        .from("archivos")
        .getPublicUrl(`${carpeta}/${file.name}`);

      const verUrl = urlData?.publicUrl || "#";
      const descargarUrl = `${verUrl}?download=${file.name}`;

      const col = document.createElement("div");
      col.className = "col-md-4";

      col.innerHTML = `
        <div class="card h-100 p-3 text-center">
          <h5 class="card-title">${file.name}</h5>
          <div class="d-grid gap-2 mt-2">
            <a href="${verUrl}" target="_blank" class="btn btn-primary">👁 Ver</a>
            <a href="${descargarUrl}" class="btn btn-success">⬇ Descargar</a>
          </div>
        </div>
      `;

      listaArchivos.appendChild(col);
    }
  }

  cargarArchivos();
</script>

</body>
</html>
