<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Trabajos por Semana</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f8f9fa;
    }
    .sidebar {
      max-height: 80vh;
      overflow-y: auto;
      border-right: 2px solid #ddd;
    }
    .file-card {
      cursor: pointer;
      transition: transform 0.2s, background 0.2s;
    }
    .file-card:hover {
      transform: scale(1.02);
      background: #f1f1f1;
    }
    #preview iframe {
      width: 100%;
      height: 80vh;
      border: none;
      border-radius: 10px;
      background: #fff;
    }
    #preview .placeholder {
      height: 80vh;
      display: flex;
      align-items: center;
      justify-content: center;
      color: #aaa;
      font-size: 1.2rem;
      border: 2px dashed #ccc;
      border-radius: 10px;
    }
  </style>
</head>
<body>

<div class="container-fluid py-4">
  <h1 class="text-center mb-4" id="tituloSemana">Trabajos</h1>

  <div class="row">
    <!-- 📂 Lista de archivos -->
    <div class="col-md-4 sidebar">
      <div id="listaArchivos" class="row g-3">
        <!-- Archivos aquí -->
      </div>
    </div>

    <!-- 👁 Vista previa -->
    <div class="col-md-8">
      <div id="preview">
        <div class="placeholder">👈 Selecciona un archivo para ver su contenido</div>
      </div>
    </div>
  </div>

  <div class="text-center mt-4">
    <a href="./index.html" class="btn btn-secondary">⬅️ Volver a inicio</a>
  </div>
</div>

<!-- Supabase -->
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // 🔑 Configuración Supabase
  const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 📌 Obtener semana desde la URL
  const params = new URLSearchParams(window.location.search);
  const semanaNumero = params.get("semana") || "1";
  const carpeta = `Semana ${semanaNumero}`;

  // Cambiar título
  document.getElementById("tituloSemana").textContent = `📂 Trabajos - ${carpeta}`;

  const listaArchivos = document.getElementById("listaArchivos");
  const previewDiv = document.getElementById("preview");

  // 📂 Cargar archivos
  async function cargarArchivos() {
    const { data, error } = await supabase.storage
      .from("archivos")
      .list(carpeta, { limit: 100 });

    listaArchivos.innerHTML = "";

    if (error) {
      listaArchivos.innerHTML = `<p class="text-danger">❌ Error: ${error.message}</p>`;
      return;
    }

    if (!data || data.length === 0) {
      listaArchivos.innerHTML = `<p class="text-muted">⚠️ No hay archivos en esta semana.</p>`;
      return;
    }

    for (const file of data) {
      const { data: urlData } = supabase.storage
        .from("archivos")
        .getPublicUrl(`${carpeta}/${file.name}`);

      const publicUrl = urlData?.publicUrl || "#";

      const col = document.createElement("div");
      col.className = "col-12";

      col.innerHTML = `
        <div class="card file-card p-2 shadow-sm">
          <div class="card-body text-center">
            <h6 class="card-title text-truncate">${file.name}</h6>
            <button class="btn btn-sm btn-outline-primary w-100 mt-2">👁 Ver</button>
            <a href="${publicUrl}?download=${file.name}" class="btn btn-sm btn-success w-100 mt-2">⬇ Descargar</a>
          </div>
        </div>
      `;

      // Evento para mostrar vista previa
      col.querySelector("button").addEventListener("click", () => mostrarPreview(publicUrl, file.name));

      listaArchivos.appendChild(col);
    }
  }

  // 👁 Vista previa de archivos
  function mostrarPreview(url, name) {
    let previewContent = "";

    if (name.endsWith(".pdf")) {
      previewContent = `<iframe src="${url}" title="Vista previa PDF"></iframe>`;
    } else if (name.match(/\.(jpg|jpeg|png|gif)$/i)) {
      previewContent = `<img src="${url}" class="img-fluid rounded shadow" alt="Vista previa">`;
    } else if (name.match(/\.(mp4|webm)$/i)) {
      previewContent = `<video src="${url}" controls class="w-100 rounded shadow"></video>`;
    } else {
      previewContent = `
        <div class="placeholder">
          📄 No hay vista previa disponible para este tipo de archivo.<br>
          <a href="${url}" target="_blank" class="btn btn-primary mt-3">Abrir archivo</a>
        </div>
      `;
    }

    previewDiv.innerHTML = previewContent;
  }

  cargarArchivos();
</script>

</body>
</html>
