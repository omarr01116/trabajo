<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9...";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  // 📌 Obtener semana desde la URL
  const params = new URLSearchParams(window.location.search);
  let rawSemana = params.get("semana") || "1";

  // 🛠️ Asegurar formato correcto ("Semana X")
  const carpeta = rawSemana.startsWith("Semana") ? rawSemana : `Semana ${rawSemana}`;

  document.getElementById("tituloSemana").textContent = `Trabajos - ${carpeta}`;
  const listaArchivos = document.getElementById("listaArchivos");

  // 📂 Cargar archivos de esa semana
  async function cargarArchivos() {
    console.log("Buscando archivos en carpeta:", carpeta);

    const { data, error } = await supabase.storage
      .from("archivos")
      .list(carpeta, { limit: 100 });

    listaArchivos.innerHTML = "";

    if (error) {
      listaArchivos.innerHTML = `<div class="col-12 text-center text-danger"><p>❌ Error al listar: ${error.message}</p></div>`;
      return;
    }

    if (!data || data.length === 0) {
      listaArchivos.innerHTML = `<div class="col-12 text-center text-muted"><p>⚠️ No hay archivos en esta semana.</p></div>`;
      return;
    }

    for (const file of data) {
      const { data: urlData } = supabase.storage
        .from("archivos")
        .getPublicUrl(`${carpeta}/${file.name}`);

      const fecha = new Date(file.created_at || Date.now()).toLocaleString();

      const col = document.createElement("div");
      col.className = "col-md-4";

      col.innerHTML = `
        <div class="card h-100 p-3 text-center">
          <h5 class="card-title">${file.name}</h5>
          <p class="card-text"><small>${fecha}</small></p>
          <div class="d-grid gap-2">
            <a href="${urlData.publicUrl}" target="_blank" class="btn btn-custom">👁 Ver</a>
            <a href="${urlData.publicUrl}" download="${file.name}" class="btn btn-custom">⬇ Descargar</a>
          </div>
        </div>
      `;

      listaArchivos.appendChild(col);
    }
  }

  cargarArchivos();
</script>
