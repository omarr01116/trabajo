<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Panel del Estudiante</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <!-- Navbar -->
  <nav class="navbar navbar-dark bg-success">
    <div class="container">
      <a class="navbar-brand" href="index.html">Gestor de Trabajos</a>
      <span class="navbar-text text-white">Estudiante</span>
    </div>
  </nav>

  <!-- Contenido -->
  <div class="container mt-5">
    <h3 class="mb-4">Subir Trabajo</h3>
    <form>
      <div class="mb-3">
        <label class="form-label">Seleccionar Semana</label>
        <select class="form-select">
          <option>Semana 1</option>
          <option>Semana 2</option>
          <option>Semana 3</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Subir Archivo</label>
        <input type="file" class="form-control" accept=".pdf,.doc,.docx">
      </div>
      <button type="submit" class="btn btn-success">Subir</button>
    </form>
  </div>

</body>
</html>
