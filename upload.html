<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir Trabajos - Omar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .navbar {
      background-color: #111 !important;
      border-bottom: 2px solid cyan;
      box-shadow: 0 0 10px cyan;
    }
    .navbar-brand {
      font-weight: bold;
      color: cyan !important;
      text-shadow: 0 0 10px cyan, 0 0 20px cyan;
    }
    .btn-outline-light {
      border: 1px solid cyan;
      color: cyan;
      transition: all 0.3s;
    }
    .btn-outline-light:hover {
      background: cyan;
      color: #000;
      box-shadow: 0 0 10px cyan;
    }
    .form-card {
      background: #1f1f1f;
      border: 2px solid cyan;
      border-radius: 15px;
      padding: 30px;
      box-shadow: 0 0 20px rgba(0,255,255,0.5);
    }
    h2 { color: cyan; text-shadow: 0 0 12px cyan; }
    label { color: #ccc; }
    .form-select, .form-control {
      background-color: #121212;
      border: 1px solid #333;
      color: #fff;
    }
    .form-select:focus, .form-control:focus {
      border-color: cyan;
      box-shadow: 0 0 10px cyan;
      background-color: #121212;
      color: #fff;
    }
    .btn-primary {
      background: cyan; border: none; font-weight: bold; color: #000;
      box-shadow: 0 0 15px cyan; transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: magenta; box-shadow: 0 0 20px magenta; color: #fff;
    }
    #mensaje {
      margin-top: 15px;
      font-weight: bold;
      text-align: center;
    }
  </style>
</head>
<body>

<nav class="navbar px-3">
  <a href="index.html" class="btn btn-outline-light">⬅️ Volver</a>
  <span class="navbar-brand ms-3">📂 Subida de Trabajos</span>
</nav>

<div class="container d-flex justify-content-center align-items-center vh-100">
  <div class="form-card w-100" style="max-width: 500px;">
    <h2 class="text-center mb-4">Subir Trabajo</h2>
    <form id="uploadForm">
      <div class="mb-3">
        <label for="semana" class="form-label">Seleccionar semana</label>
        <select id="semana" class="form-select" required>
          <option value="">-- Seleccionar --</option>
          <option value="semana1">Semana 1</option>
          <option value="semana2">Semana 2</option>
          <option value="semana3">Semana 3</option>
        </select>
      </div>
      <div class="mb-3">
        <label for="archivo" class="form-label">Subir archivo</label>
        <input id="archivo" type="file" class="form-control" accept=".pdf,.doc,.docx,.jpg,.png" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">🚀 Subir</button>
    </form>
    <div id="mensaje"></div>
  </div>
</div>

<!-- Firebase SDK -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.12.2/firebase-firestore.js";

  // 🔹 Configuración de tu proyecto Firebase
  const firebaseConfig = {
    apiKey: "TU_API_KEY",
    authDomain: "TU_PROJECT_ID.firebaseapp.com",
    projectId: "TU_PROJECT_ID",
  };

  // Inicializar Firebase
  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  // Convertir archivo a Base64
  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.readAsDataURL(file);
      reader.onload = () => resolve(reader.result.split(",")[1]); // solo el Base64
      reader.onerror = error => reject(error);
    });
  }

  document.getElementById("uploadForm").addEventListener("submit", async (e) => {
    e.preventDefault();
    const mensaje = document.getElementById("mensaje");
    mensaje.textContent = "⏳ Subiendo...";
    mensaje.style.color = "yellow";

    const semana = document.getElementById("semana").value;
    const archivoInput = document.getElementById("archivo");
    const file = archivoInput.files[0];

    if (!file) {
      mensaje.textContent = "⚠️ Selecciona un archivo";
      mensaje.style.color = "red";
      return;
    }

    try {
      const base64 = await fileToBase64(file);

      await addDoc(collection(db, "trabajos"), {
        nombreArchivo: file.name,
        tipo: file.type,
        semana: semana,
        archivo: base64,
        fecha: serverTimestamp()
      });

      mensaje.style.color = "lime";
      mensaje.textContent = "✅ Archivo subido correctamente";
      document.getElementById("uploadForm").reset();
    } catch (err) {
      console.error(err);
      mensaje.style.color = "red";
      mensaje.textContent = "❌ Error al subir archivo";
    }
  });
</script>

</body>
</html>
