<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Subir y Gestionar Archivos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #0ff;
      font-family: Arial, sans-serif;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px #0ff;
      margin: 15px;
    }
    .btn-custom {
      background: #0ff;
      color: #000;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #00cccc;
      color: #fff;
    }
    .btn-danger {
      font-size: 0.8rem;
      padding: 4px 8px;
    }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="row">
    
    <!-- Subir archivos -->
    <div class="col-md-5">
      <div class="card">
        <h3 class="mb-3">🚀 Subir Trabajo</h3>
        <form id="formUpload">
          <div class="mb-3">
            <label for="semana" class="form-label">Seleccionar semana</label>
            <select id="semana" class="form-select" required>
              <option value="Semana 1">Semana 1</option>
              <option value="Semana 2">Semana 2</option>
              <option value="Semana 3">Semana 3</option>
              <option value="Semana 4">Semana 4</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="archivo" class="form-label">Subir archivo</label>
            <input type="file" id="archivo" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-custom w-100">Subir</button>
        </form>
        <p id="estado" class="mt-3"></p>
      </div>
    </div>

    <!-- Lista de archivos -->
    <div class="col-md-7">
      <div class="card">
        <h3 class="mb-3">📂 Archivos por semana</h3>
        <div class="mb-3">
          <label for="filtroSemana" class="form-label">Filtrar por semana</label>
          <select id="filtroSemana" class="form-select">
            <option value="Semana 1">Semana 1</option>
            <option value="Semana 2">Semana 2</option>
            <option value="Semana 3">Semana 3</option>
            <option value="Semana 4">Semana 4</option>
          </select>
        </div>
        <table class="table table-dark table-sm">
          <thead>
            <tr>
              <th>Archivo</th>
              <th>Fecha</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="listaArchivos">
            <!-- Aquí se listan los archivos -->
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Supabase -->
<script type="module">
  import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

  // 🔑 Configuración Supabase
  const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
  const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
  const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

  const form = document.getElementById("formUpload");
  const estado = document.getElementById("estado");
  const listaArchivos = document.getElementById("listaArchivos");
  const filtroSemana = document.getElementById("filtroSemana");

  // 🔼 Subir archivo
  form.addEventListener("submit", async (e) => {
    e.preventDefault();
    const archivo = document.getElementById("archivo").files[0];
    const semana = document.getElementById("semana").value;

    if (!archivo) {
      estado.textContent = "⚠️ Selecciona un archivo.";
      estado.style.color = "yellow";
      return;
    }

    estado.textContent = "⏳ Subiendo...";
    estado.style.color = "orange";

    const filePath = `${semana}/${Date.now()}_${archivo.name}`;

    const { error } = await supabase.storage
      .from("archivos")
      .upload(filePath, archivo);

    if (error) {
      estado.textContent = "❌ Error al subir: " + error.message;
      estado.style.color = "red";
      return;
    }

    estado.textContent = "✅ Archivo subido.";
    estado.style.color = "lime";
    form.reset();

    cargarArchivos(filtroSemana.value);
  });

  // 📂 Cargar archivos de una semana
  async function cargarArchivos(semana) {
    const { data, error } = await supabase.storage
      .from("archivos")
      .list(semana, { limit: 100 });

    listaArchivos.innerHTML = "";

    if (error) {
      listaArchivos.innerHTML = "<tr><td colspan='3'>❌ Error al listar</td></tr>";
      return;
    }

    if (data.length === 0) {
      listaArchivos.innerHTML = "<tr><td colspan='3'>📭 Sin archivos</td></tr>";
      return;
    }

    data.forEach(async (file) => {
      const { data: urlData } = await supabase.storage
        .from("archivos")
        .getPublicUrl(`${semana}/${file.name}`);

      const fecha = new Date(file.created_at || Date.now()).toLocaleString();

      const row = document.createElement("tr");
      row.innerHTML = `
        <td><a href="${urlData.publicUrl}" target="_blank">${file.name}</a></td>
        <td>${fecha}</td>
        <td>
          <button class="btn btn-danger btn-sm" onclick="eliminarArchivo('${semana}/${file.name}')">Borrar</button>
        </td>
      `;
      listaArchivos.appendChild(row);
    });
  }

  // 🎯 Cambiar semana en filtro
  filtroSemana.addEventListener("change", () => {
    cargarArchivos(filtroSemana.value);
  });

  // 🗑️ Eliminar archivo
  window.eliminarArchivo = async (path) => {
    const { error } = await supabase.storage.from("archivos").remove([path]);
    if (error) {
      alert("❌ Error al eliminar: " + error.message);
    } else {
      alert("✅ Archivo eliminado.");
      cargarArchivos(filtroSemana.value);
    }
  };

  // 🚀 Cargar inicial
  cargarArchivos(filtroSemana.value);
</script>

</body>
</html>
