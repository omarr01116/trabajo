<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Subir Trabajos - Mis Chambas</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body class="bg-light">

  <nav class="navbar navbar-dark bg-dark px-3">
    <a href="index.html" class="btn btn-outline-light">⬅️ Volver</a>
    <span class="navbar-brand ms-3">Subida de Trabajos</span>
  </nav>

  <div class="container py-5">
    <h2 class="text-center mb-4">Subir Trabajo</h2>

    <form class="shadow p-4 bg-white rounded">
      <div class="mb-3">
        <label class="form-label">Seleccionar semana</label>
        <select class="form-select">
          <option>Semana 1</option>
          <option>Semana 2</option>
          <option>Semana 3</option>
        </select>
      </div>
      <div class="mb-3">
        <label class="form-label">Subir archivo</label>
        <input type="file" class="form-control">
      </div>
      <button type="submit" class="btn btn-primary w-100">Subir</button>
    </form>
  </div>

</body>
</html>
