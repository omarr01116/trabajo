<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Subir y Gestionar Archivos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #0ff;
      font-family: Arial, sans-serif;
      padding: 20px;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px #0ff;
    }
    .btn-custom {
      background: #0ff;
      color: #000;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #00cccc;
      color: #fff;
    }
    h2, h3 {
      color: #0ff;
    }
  </style>
</head>
<body>

<div class="container">
  <div class="row g-4">
    <!-- Subir Archivos -->
    <div class="col-md-5">
      <div class="card">
        <h2 class="mb-3">🚀 Subir Trabajo</h2>
        <form id="formUpload">
          <div class="mb-3">
            <label for="semana" class="form-label">Seleccionar semana</label>
            <select id="semana" class="form-select" required>
              <option value="Semana 1">Semana 1</option>
              <option value="Semana 2">Semana 2</option>
              <option value="Semana 3">Semana 3</option>
              <option value="Semana 4">Semana 4</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="archivo" class="form-label">Subir archivo</label>
            <input type="file" id="archivo" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-custom w-100">Subir</button>
        </form>
        <p id="estado" class="mt-3"></p>
      </div>
    </div>

    <!-- Lista de Archivos -->
    <div class="col-md-7">
      <div class="card">
        <h3>📂 Archivos Subidos</h3>
        <div class="mb-3">
          <label for="filtroSemana" class="form-label">Filtrar por semana</label>
          <select id="filtroSemana" class="form-select">
            <option value="Todos">Todos</option>
            <option value="Semana 1">Semana 1</option>
            <option value="Semana 2">Semana 2</option>
            <option value="Semana 3">Semana 3</option>
            <option value="Semana 4">Semana 4</option>
          </select>
        </div>
        <table class="table table-dark table-hover">
          <thead>
            <tr>
              <th>Nombre</th>
              <th>Semana</th>
              <th>Fecha</th>
              <th>Acciones</th>
            </tr>
          </thead>
          <tbody id="listaArchivos">
            <tr><td colspan="4" class="text-center">⏳ Cargando...</td></tr>
          </tbody>
        </table>
      </div>
    </div>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
  import { getFirestore, collection, addDoc, getDocs, deleteDoc, doc, serverTimestamp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";

  // Configuración Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDGayNF28OA_WLc0hSTtATeDHDrPK2r2vY",
    authDomain: "trabajo-3d72f.firebaseapp.com",
    projectId: "trabajo-3d72f",
    storageBucket: "trabajo-3d72f.firebasestorage.app",
    messagingSenderId: "1041599599176",
    appId: "1:1041599599176:web:ac463901916c8c91a3be7d",
    measurementId: "G-WE0X8C5X2Z"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);

  const form = document.getElementById("formUpload");
  const estado = document.getElementById("estado");
  const listaArchivos = document.getElementById("listaArchivos");
  const filtroSemana = document.getElementById("filtroSemana");

  // Subir archivo
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const archivo = document.getElementById("archivo").files[0];
    const semana = document.getElementById("semana").value;

    if (!archivo) {
      estado.textContent = "⚠️ Selecciona un archivo.";
      estado.style.color = "yellow";
      return;
    }

    estado.textContent = "⏳ Subiendo...";
    estado.style.color = "orange";

    try {
      await addDoc(collection(db, "archivos"), {
        NombreArchivo: archivo.name,
        semana: semana,
        fecha: serverTimestamp(),
        tipo: archivo.type || "desconocido"
      });

      estado.textContent = "✅ Archivo registrado en Firestore.";
      estado.style.color = "lime";
      cargarArchivos(); // refrescar tabla
    } catch (err) {
      console.error("Error al subir:", err);
      estado.textContent = "❌ Error al registrar el archivo.";
      estado.style.color = "red";
    }
  });

  // Cargar archivos
  async function cargarArchivos() {
    listaArchivos.innerHTML = "<tr><td colspan='4' class='text-center'>⏳ Cargando...</td></tr>";
    const querySnapshot = await getDocs(collection(db, "archivos"));

    let rows = "";
    querySnapshot.forEach((docSnap) => {
      const data = docSnap.data();
      const fecha = data.fecha?.toDate ? data.fecha.toDate().toLocaleString() : "N/A";

      // Filtrar por semana
      if (filtroSemana.value !== "Todos" && data.semana !== filtroSemana.value) return;

      rows += `
        <tr>
          <td>${data.NombreArchivo}</td>
          <td>${data.semana}</td>
          <td>${fecha}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="eliminarArchivo('${docSnap.id}')">🗑️ Eliminar</button>
          </td>
        </tr>
      `;
    });

    listaArchivos.innerHTML = rows || "<tr><td colspan='4' class='text-center'>📭 No hay archivos</td></tr>";
  }

  // Eliminar archivo
  window.eliminarArchivo = async (id) => {
    if (confirm("¿Seguro que deseas eliminar este archivo?")) {
      await deleteDoc(doc(db, "archivos", id));
      cargarArchivos();
    }
  };

  filtroSemana.addEventListener("change", cargarArchivos);

  // Primera carga
  cargarArchivos();
</script>
</body>
</html>
