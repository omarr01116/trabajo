<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Panel Admin - Subir y Gestionar Archivos</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #0ff;
      font-family: Arial, sans-serif;
    }
    .card {
      background: #111;
      padding: 20px;
      border-radius: 15px;
      box-shadow: 0 0 20px #0ff;
      margin: 15px;
    }
    .btn-custom {
      background: #0ff;
      color: #000;
      font-weight: bold;
      transition: 0.3s;
    }
    .btn-custom:hover {
      background: #00cccc;
      color: #fff;
    }
    .btn-danger {
      font-size: 0.8rem;
      padding: 4px 8px;
    }
  </style>
</head>
<body>

<div class="container py-4">
  <div class="row">
    
    <!-- Subir archivos -->
    <div class="col-md-5">
      <div class="card">
        <h3 class="mb-3">🚀 Subir Trabajo</h3>
        <form id="formUpload">
          <div class="mb-3">
            <label for="semana" class="form-label">Seleccionar semana</label>
            <select id="semana" class="form-select" required>
              <option value="Semana 1">Semana 1</option>
              <option value="Semana 2">Semana 2</option>
              <option value="Semana 3">Semana 3</option>
              <option value="Semana 4">Semana 4</option>
            </select>
          </div>

          <div class="mb-3">
            <label for="archivo" class="form-label">Subir archivo</label>
            <input type="file" id="archivo" class="form-control" required>
          </div>

          <button type="submit" class="btn btn-custom w-100">Subir</button>
        </form>
        <p id="estado" class="mt-3"></p>
      </div>
    </div>

    <!-- Lista de archivos -->
    <div class="col-md-7">
      <div class="card">
        <h3 class="mb-3">📂 Archivos por semana</h3>
        <div class="mb-3">
          <label for="filtroSemana" class="form-label">Filtrar por semana</label>
          <select id="filtroSemana" class="form-select">
            <option value="Semana 1">Semana 1</option>
            <option value="Semana 2">Semana 2</option>
            <option value="Semana 3">Semana 3</option>
            <option value="Semana 4">Semana 4</option>
          </select>
        </div>
        <table class="table table-dark table-sm">
          <thead>
            <tr>
              <th>Archivo</th>
              <th>Fecha</th>
              <th>Acción</th>
            </tr>
          </thead>
          <tbody id="listaArchivos">
            <!-- Aquí se listan los archivos -->
          </tbody>
        </table>
      </div>
    </div>

  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
  import { 
    getFirestore, collection, addDoc, serverTimestamp, query, where, onSnapshot, deleteDoc, doc 
  } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-firestore.js";
  import { 
    getAuth, signInWithEmailAndPassword, onAuthStateChanged 
  } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

  // Configuración Firebase
  const firebaseConfig = {
    apiKey: "AIzaSyDGayNF28OA_WLc0hSTtATeDHDrPK2r2vY",
    authDomain: "trabajo-3d72f.firebaseapp.com",
    projectId: "trabajo-3d72f",
    storageBucket: "trabajo-3d72f.firebasestorage.app",
    messagingSenderId: "1041599599176",
    appId: "1:1041599599176:web:ac463901916c8c91a3be7d",
    measurementId: "G-WE0X8C5X2Z"
  };

  const app = initializeApp(firebaseConfig);
  const db = getFirestore(app);
  const auth = getAuth(app);

  const form = document.getElementById("formUpload");
  const estado = document.getElementById("estado");
  const listaArchivos = document.getElementById("listaArchivos");
  const filtroSemana = document.getElementById("filtroSemana");

  let userUID = null;

  // 🔑 Detectar usuario logueado
  onAuthStateChanged(auth, (user) => {
    if (user) {
      userUID = user.uid;
      console.log("Usuario logueado:", user.email, "UID:", userUID);
      cargarArchivos(filtroSemana.value);
    } else {
      alert("⚠️ No estás logueado, inicia sesión.");
    }
  });

  // Subir archivo
  form.addEventListener("submit", async (e) => {
    e.preventDefault();

    const archivo = document.getElementById("archivo").files[0];
    const semana = document.getElementById("semana").value;

    if (!archivo) {
      estado.textContent = "⚠️ Selecciona un archivo.";
      estado.style.color = "yellow";
      return;
    }

    estado.textContent = "⏳ Subiendo...";
    estado.style.color = "orange";

    try {
      await addDoc(collection(db, "archivos"), {
        NombreArchivo: archivo.name,
        semana: semana,
        fecha: serverTimestamp(),
        tipo: archivo.type || "desconocido"
      });

      estado.textContent = "✅ Archivo registrado en Firestore.";
      estado.style.color = "lime";
      form.reset();
    } catch (err) {
      console.error("Error al subir:", err);
      estado.textContent = "❌ Error al registrar el archivo.";
      estado.style.color = "red";
    }
  });

  // Cargar archivos por semana
  function cargarArchivos(semana) {
    const q = query(collection(db, "archivos"), where("semana", "==", semana));
    onSnapshot(q, (snapshot) => {
      listaArchivos.innerHTML = "";
      let i = 1;
      snapshot.forEach((docSnap) => {
        const data = docSnap.data();
        const fecha = data.fecha?.toDate ? data.fecha.toDate().toLocaleString() : "Sin fecha";
        
        const row = document.createElement("tr");
        row.innerHTML = `
          <td>${data.NombreArchivo}</td>
          <td>${fecha}</td>
          <td>
            <button class="btn btn-danger btn-sm" onclick="eliminarArchivo('${docSnap.id}')">Borrar</button>
          </td>
        `;
        listaArchivos.appendChild(row);
      });
    });
  }

  // Cambiar semana en filtro
  filtroSemana.addEventListener("change", () => {
    cargarArchivos(filtroSemana.value);
  });

  // Eliminar archivo (solo si reglas lo permiten)
  window.eliminarArchivo = async (id) => {
    try {
      await deleteDoc(doc(db, "archivos", id));
      alert("✅ Archivo eliminado.");
    } catch (err) {
      console.error("Error al eliminar:", err);
      alert("❌ No tienes permisos para borrar.");
    }
  };
</script>

</body>
</html>
