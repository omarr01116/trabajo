<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <title>Login - Repositorio Omar</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #fff;
      font-family: 'Segoe UI', sans-serif;
    }
    .card {
      background-color: #111;
      border: 2px solid #0ff;
      box-shadow: 0 0 15px #0ff, 0 0 30px #00f;
      border-radius: 15px;
      color: #0ff;
    }
    .form-control {
      background-color: #222;
      border: 1px solid #0ff;
      color: #fff;
    }
    .form-control:focus {
      border-color: #f0f;
      box-shadow: 0 0 10px #f0f;
    }
    .btn-primary {
      background: linear-gradient(90deg, #0ff, #f0f);
      border: none;
      color: #000;
      font-weight: bold;
      text-shadow: 0 0 5px #fff;
    }
    .btn-primary:hover {
      box-shadow: 0 0 15px #0ff, 0 0 25px #f0f;
    }
    a {
      color: #0ff;
      text-decoration: none;
    }
    a:hover {
      color: #f0f;
      text-shadow: 0 0 10px #f0f;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">
  <div class="card shadow-lg p-4" style="width: 350px;">
    <h3 class="text-center mb-4">Iniciar Sesión</h3>
    <form id="loginForm">
      <div class="mb-3">
        <label for="usuario" class="form-label">Usuario</label>
        <input type="text" class="form-control" id="usuario" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
      <p id="errorMsg" class="text-center text-danger mt-2"></p>
    </form>
    <div class="text-center mt-3">
      <a href="./index.html">⬅️ Volver</a>
    </div>
  </div>

  <script>
    if (!localStorage.getItem("usuarios")) {
      const usuarios = [
        { id: 1, usuario: "omar", password: "1234" },
        { id: 2, usuario: "admin", password: "admin" }
      ];
      localStorage.setItem("usuarios", JSON.stringify(usuarios));
    }

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();
      const usuario = document.getElementById("usuario").value.trim();
      const password = document.getElementById("password").value.trim();
      const usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

      const user = usuarios.find(u => u.usuario === usuario && u.password === password);

      if (user) {
        localStorage.setItem("usuario_id", user.id);
        window.location.href = "./index.html";
      } else {
        document.getElementById("errorMsg").textContent = "Usuario o contraseña incorrectos";
      }
    });
  </script>
</body>
</html>
