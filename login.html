<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login</title>
</head>
<body>
  <h2>Iniciar Sesión</h2>
  <form id="loginForm">
    <input type="email" id="email" placeholder="Correo" required><br>
    <input type="password" id="password" placeholder="Contraseña" required><br>
    <button type="submit">Ingresar</button>
  </form>

  <!-- Firebase -->
  <script type="module">
    // Importar SDK de Firebase
    import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

    // Configuración de tu proyecto
    const firebaseConfig = {
      apiKey: "AIzaSyDGayNF28OA_WLc0hSTtATeDHDrPK2r2vY",
      authDomain: "trabajo-3d72f.firebaseapp.com",
      projectId: "trabajo-3d72f",
      storageBucket: "trabajo-3d72f.firebasestorage.app",
      messagingSenderId: "1041599599176",
      appId: "1:1041599599176:web:ac463901916c8c91a3be7d",
      measurementId: "G-WE0X8C5X2Z"
    };

    // Inicializar Firebase
    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);

    // Manejar login
    document.getElementById("loginForm").addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        const userCredential = await signInWithEmailAndPassword(auth, email, password);
        alert("Login exitoso, bienvenido " + userCredential.user.email);
        window.location.href = "upload.html"; // Redirigir si todo ok
      } catch (error) {
        alert("Error: " + error.message);
      }
    });
  </script>
</body>
</html>
