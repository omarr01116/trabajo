<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Repositorio</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">

  <style>
    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      height: 100vh;
    }

    .login-box {
      background: #1a1a1a;
      padding: 40px;
      border-radius: 15px;
      text-align: center;
      box-shadow: 0 0 15px rgba(0, 255, 255, 0.3);
      width: 100%;
      max-width: 400px;
    }

    h2 {
      color: #0ff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 25px;
      animation: neonGlow 2s infinite alternate;
    }

    @keyframes neonGlow {
      from { text-shadow: 0 0 5px #0ff, 0 0 15px #0ff; }
      to { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
    }

    input {
      width: 100%;
      padding: 12px;
      margin: 12px 0;
      border: none;
      border-radius: 8px;
      outline: none;
      background: #111;
      color: #0ff;
      font-size: 1rem;
      box-shadow: 0 0 10px #0ff inset;
    }

    input::placeholder {
      color: #777;
    }

    button {
      width: 100%;
      padding: 12px;
      background: #0ff;
      border: none;
      border-radius: 8px;
      font-weight: bold;
      color: #000;
      cursor: pointer;
      box-shadow: 0 0 15px #0ff;
      transition: all 0.3s ease;
      margin-top: 10px;
    }

    button:hover {
      background: #ff00ff;
      color: #fff;
      box-shadow: 0 0 20px #ff00ff, 0 0 40px #ff00ff;
    }

    .error-message {
      margin-top: 15px;
      color: #ff4d4d;
      text-shadow: 0 0 10px #ff4d4d, 0 0 20px #ff1a1a;
      font-weight: bold;
      display: none;
    }

    .back-btn {
      margin-top: 20px;
      display: inline-block;
      padding: 8px 20px;
      color: #0ff;
      border: 1px solid #0ff;
      border-radius: 8px;
      text-decoration: none;
      transition: all 0.3s ease;
      box-shadow: 0 0 10px #0ff;
    }

    .back-btn:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 20px #0ff;
    }
  </style>
</head>
<body>
  <div class="login-box">
    <h2>Iniciar Sesión</h2>
    <form id="loginForm">
      <input type="email" id="email" placeholder="Correo" required>
      <input type="password" id="password" placeholder="Contraseña" required>
      <button type="submit">Ingresar</button>
    </form>
    <div id="errorMessage" class="error-message"></div>
    <a href="index.html" class="back-btn">← Volver</a>
  </div>

  <!-- Supabase -->
  <script type="module">
    import { createClient } from "https://esm.sh/@supabase/supabase-js@2";

    // 🔑 Tus credenciales de Supabase
    const SUPABASE_URL = "https://bazwwhwjruwgyfomyttp.supabase.co";
    const SUPABASE_ANON_KEY = "eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6ImJhend3aHdqcnV3Z3lmb215dHRwIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NTgxNjA1NTAsImV4cCI6MjA3MzczNjU1MH0.RzpCKpYV-GqNIhTklsQtRqyiPCGGmVlUs7q_BeBHxUo";
    const supabase = createClient(SUPABASE_URL, SUPABASE_ANON_KEY);

    const form = document.getElementById("loginForm");
    const errorMessage = document.getElementById("errorMessage");

    form.addEventListener("submit", async (e) => {
      e.preventDefault();
      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      try {
        // 🔑 Intentar login con Supabase
        const { data, error } = await supabase.auth.signInWithPassword({
          email,
          password
        });

        if (error) throw error;

        // ✅ Login correcto → redirigir
        window.location.href = "upload.html";
      } catch (err) {
        errorMessage.style.display = "block";
        errorMessage.textContent = "⚠ " + err.message;
      }
    });
  </script>
</body>
</html>
