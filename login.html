<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Omar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      background-color: #1f1f1f;
      border: 2px solid cyan;
      border-radius: 15px;
      box-shadow: 0 0 15px cyan, 0 0 30px rgba(0,255,255,0.5);
    }
    h3 { color: cyan; text-shadow: 0 0 10px cyan, 0 0 20px cyan; }
    label { color: #bbb; }
    .form-control {
      background-color: #121212;
      border: 1px solid #333;
      color: #fff;
    }
    .form-control:focus {
      border-color: cyan;
      box-shadow: 0 0 10px cyan;
      background-color: #121212;
      color: #fff;
    }
    .btn-primary {
      background: cyan; border: none; font-weight: bold; color: #000;
      box-shadow: 0 0 15px cyan; transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: magenta; box-shadow: 0 0 20px magenta; color: #fff;
    }
    a { color: magenta; text-shadow: 0 0 8px magenta; transition: 0.3s; }
    a:hover { color: cyan; text-shadow: 0 0 12px cyan; }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

<div class="card shadow-lg p-4" style="width: 350px;">
  <h3 class="text-center mb-4">Iniciar Sesión</h3>

  <!-- Formulario -->
  <form id="loginForm">
    <div class="mb-3">
      <label for="usuario" class="form-label">Correo</label>
      <input type="email" class="form-control" id="usuario" placeholder="Ingresa tu correo" required>
    </div>
    <div class="mb-3">
      <label for="password" class="form-label">Contraseña</label>
      <input type="password" class="form-control" id="password" placeholder="Ingresa tu contraseña" required>
    </div>
    <button type="submit" class="btn btn-primary w-100">Entrar</button>
  </form>

  <div class="text-center mt-3">
    <a href="index.html">⬅️ Volver</a>
  </div>
</div>

<!-- Firebase -->
<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/12.2.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } 
    from "https://www.gstatic.com/firebasejs/12.2.1/firebase-auth.js";

  // Tu configuración
  const firebaseConfig = {
    apiKey: "AIzaSyBAP3fjuvI7UT9IptOzL_Zw24VvNiLsBYQ",
    authDomain: "trabajo-33782.firebaseapp.com",
    projectId: "trabajo-33782",
    storageBucket: "trabajo-33782.appspot.com",
    messagingSenderId: "191927594007",
    appId: "1:191927594007:web:b11b2e0ebc3d49069e8052"
  };

  // Inicializar
  const app = initializeApp(firebaseConfig);
  const auth = getAuth(app);

  // Login
  document.getElementById("loginForm").addEventListener("submit", (e) => {
    e.preventDefault();
    const email = document.getElementById("usuario").value;
    const password = document.getElementById("password").value;

    signInWithEmailAndPassword(auth, email, password)
      .then(userCredential => {
        alert("✅ Bienvenido " + userCredential.user.email);
        window.location.href = "index.html"; // redirige al index
      })
      .catch(error => {
        alert("❌ Error: " + error.message);
      });
  });
</script>

</body>
</html>
