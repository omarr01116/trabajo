<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Repositorio Académico</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background-color: #0d0d0d;
      color: #e0e0e0;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }

    .login-container {
      max-width: 400px;
      margin: 80px auto;
      padding: 30px;
      background: #1a1a1a;
      border-radius: 12px;
      box-shadow: 0 0 15px rgba(0,255,255,0.3);
    }

    h2 {
      text-align: center;
      color: #0ff;
      text-shadow: 0 0 10px #0ff, 0 0 20px #0ff;
      margin-bottom: 20px;
    }

    .form-control {
      background: #111;
      border: 1px solid #0ff;
      color: #e0e0e0;
    }

    .form-control:focus {
      box-shadow: 0 0 10px #0ff;
      border-color: #0ff;
    }

    .btn-neon {
      background: transparent;
      border: 1px solid #0ff;
      color: #0ff;
      transition: all 0.3s;
      width: 100%;
    }

    .btn-neon:hover {
      background: #0ff;
      color: #000;
      box-shadow: 0 0 15px #0ff;
    }

    .text-center a {
      color: #0ff;
      text-decoration: none;
    }

    .text-center a:hover {
      text-shadow: 0 0 5px #0ff;
    }
  </style>
</head>
<body>

  <div class="login-container">
    <h2><i class="bi bi-box-arrow-in-right"></i> Iniciar Sesión</h2>
    <form id="loginForm">
      <div class="mb-3">
        <label for="email" class="form-label">Correo</label>
        <input type="email" class="form-control" id="email" placeholder="ejemplo@correo.com" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" placeholder="•••••••" required>
      </div>
      <button type="submit" class="btn btn-neon">Ingresar</button>
    </form>
    <div class="text-center mt-3">
      <a href="index.html"><i class="bi bi-arrow-left-circle"></i> Volver</a>
    </div>
  </div>

  <script>
    const emailDemo = "omar@gmail.com";
    const passwordDemo = "123456";

    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      const email = document.getElementById("email").value;
      const password = document.getElementById("password").value;

      if (email === emailDemo && password === passwordDemo) {
        window.location.href = "semana1.html";
      } else {
        alert("❌ Usuario o contraseña incorrectos");
      }
    });
  </script>

</body>
</html>
