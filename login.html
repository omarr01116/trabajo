<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login - Repositorio Omar</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.3/dist/css/bootstrap.min.css" rel="stylesheet">
  <link href="https://cdn.jsdelivr.net/npm/bootstrap-icons/font/bootstrap-icons.css" rel="stylesheet">
  <style>
    body {
      background: radial-gradient(circle at top, #1a1a1a, #000);
      color: white;
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
    }
    .card {
      background-color: #1f1f1f;
      border: 2px solid cyan;
      border-radius: 15px;
      box-shadow: 0 0 15px cyan, 0 0 30px rgba(0,255,255,0.5);
    }
    h3 {
      color: cyan;
      text-shadow: 0 0 10px cyan, 0 0 20px cyan;
      animation: neonGlow 1.5s infinite alternate;
    }
    @keyframes neonGlow {
      from { text-shadow: 0 0 5px #0ff, 0 0 15px #0ff; }
      to   { text-shadow: 0 0 20px #0ff, 0 0 40px #0ff; }
    }
    label { color: #bbb; }
    .form-control {
      background-color: #121212;
      border: 1px solid #333;
      color: #fff;
    }
    .form-control:focus {
      border-color: cyan;
      box-shadow: 0 0 10px cyan;
      background-color: #121212;
      color: #fff;
    }
    .btn-primary {
      background: cyan;
      border: none;
      font-weight: bold;
      color: #000;
      box-shadow: 0 0 15px cyan;
      transition: all 0.3s ease;
    }
    .btn-primary:hover {
      background: magenta;
      box-shadow: 0 0 20px magenta;
      color: #fff;
    }
    a {
      color: magenta;
      text-shadow: 0 0 8px magenta;
      transition: 0.3s;
    }
    a:hover {
      color: cyan;
      text-shadow: 0 0 12px cyan;
    }
    .error {
      color: #ff4d4d;
      font-weight: bold;
      text-shadow: 0 0 8px red;
      margin-top: 10px;
    }
  </style>
</head>
<body class="d-flex align-items-center justify-content-center vh-100">

  <div class="card shadow-lg p-4" style="width: 350px;">
    <h3 class="text-center mb-4">Iniciar Sesión</h3>

    <!-- Formulario -->
    <form id="loginForm">
      <div class="mb-3">
        <label for="usuario" class="form-label">Usuario</label>
        <input type="text" class="form-control" id="usuario" required>
      </div>
      <div class="mb-3">
        <label for="password" class="form-label">Contraseña</label>
        <input type="password" class="form-control" id="password" required>
      </div>
      <button type="submit" class="btn btn-primary w-100">Entrar</button>
      <p id="errorMsg" class="error text-center"></p>
    </form>

    <div class="text-center mt-3">
      <a href="./index.html">⬅️ Volver</a>
    </div>
  </div>

  <script>
    // Crear "tabla usuarios" si no existe
    if (!localStorage.getItem("usuarios")) {
      let usuarios = [
        { id: 1, usuario: "omar", password: "1234" }, 
        { id: 2, usuario: "admin", password: "admin" }
      ];
      localStorage.setItem("usuarios", JSON.stringify(usuarios));
    }

    // Manejo del login
    document.getElementById("loginForm").addEventListener("submit", function(e) {
      e.preventDefault();

      let usuario = document.getElementById("usuario").value.trim();
      let password = document.getElementById("password").value.trim();
      let usuarios = JSON.parse(localStorage.getItem("usuarios")) || [];

      let user = usuarios.find(u => u.usuario === usuario && u.password === password);

      if (user) {
        localStorage.setItem("usuario_id", user.id);
        window.location.href = "./index.html";
      } else {
        document.getElementById("errorMsg").textContent = "❌ Usuario o contraseña incorrectos";
      }
    });
  </script>
</body>
</html>
